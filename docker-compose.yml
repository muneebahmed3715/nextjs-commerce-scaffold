services:
  postgres:
    image: postgres:16-alpine
    container_name: shophub-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shophub
    volumes:
      - shophub_postgres_data:/var/lib/postgresql/data

volumes:
  shophub_postgres_data:
